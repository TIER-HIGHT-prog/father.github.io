<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'>
<style>body{margin:0;font-family:sans-serif;background:linear-gradient(#0b1026,#3b0764);overflow:hidden;color:#fff}#bg{position:fixed;inset:0;background:rgba(255,255,255,.05);backdrop-filter:blur(10px)}.card{position:relative;max-width:900px;margin:4vh auto;padding:20px;border-radius:24px;background:rgba(255,255,255,.12)}img{width:100%;border-radius:18px;transition:opacity 1s}button{padding:10px 20px}</style></head><body><canvas id=c></canvas><div id=bg></div><div class=card><h1>🎉 С 40-летием, Папа! 🎂</h1><div id=cd></div><img id=im src='images/p1.jpg'><p>Спасибо за твою любовь, заботу и поддержку. Пусть впереди будет ещё много счастливых лет!</p><audio id=aud controls><source src='music.mp3'></audio></div><script>
let a=['images/p1.jpg','images/p2.jpg','images/p3.jpg','images/p4.jpg','images/p5.jpg','images/p6.jpg','images/p7.jpg'],i=0;setInterval(()=>{i=(i+1)%a.length;im.style.opacity=0;setTimeout(()=>{im.src=a[i];im.style.opacity=1},500)},3500);
let target=new Date(new Date().getFullYear(),11,31);setInterval(()=>{let d=target-new Date();cd.innerHTML=d>0?'⏳ '+Math.floor(d/86400000)+' дней до праздника':'🎉 Сегодня День рождения!';},1000);
let cv=c,x=cv.getContext('2d');function rs(){cv.width=innerWidth;cv.height=innerHeight}onresize=rs;rs();let P=[...Array(150)].map(()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:2+Math.random()*4,v:1+Math.random()*3}));setInterval(()=>{x.clearRect(0,0,cv.width,cv.height);P.forEach(p=>{p.y+=p.v;if(p.y>cv.height)p.y=0;x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fillStyle='hsl('+Math.random()*360+',100%,60%)';x.fill();})},30);
</script></body></html>
