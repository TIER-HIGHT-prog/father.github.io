<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>С Днём рождения, Папа!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0b1026,#3b0764);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
}

#bg{
    position:fixed;
    inset:0;
    backdrop-filter:blur(6px);
    background:rgba(255,255,255,.05);
    z-index:1;
}

.card{
    position:relative;
    z-index:2;
    max-width:900px;
    width:100%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

h1{
    font-size:2.3rem;
    margin-bottom:15px;
}

#cd{
    font-size:20px;
    margin-bottom:20px;
}

img{
    width:100%;
    border-radius:18px;
    transition:opacity 1s;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

p{
    margin-top:20px;
    line-height:1.7;
    font-size:18px;
}

audio{
    width:100%;
    margin-top:20px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="bg"></div>

<div class="card">

<h1>🎉 С 40-летием, Папа! 🎂</h1>

<div id="cd"></div>

<img id="im" src="images/p1.jpg">

<p>
Спасибо за твою любовь, заботу и поддержку.
Желаю крепкого здоровья, счастья,
исполнения всех мечтаний и долгих счастливых лет.
❤️
</p>

<audio controls>
<source src="music.mp3">
</audio>

</div>

<script>

const im=document.getElementById("im");
const cd=document.getElementById("cd");

const photos=[
"images/p1.jpg",
"images/p2.jpg",
"images/p3.jpg",
"images/p4.jpg",
"images/p5.jpg",
"images/p6.jpg",
"images/p7.jpg"
];

let i=0;

setInterval(()=>{
    i=(i+1)%photos.length;
    im.style.opacity=0;

    setTimeout(()=>{
        im.src=photos[i];
        im.style.opacity=1;
    },500);

},3500);

const target=new Date(new Date().getFullYear(),11,31);

setInterval(()=>{

const diff=target-new Date();

if(diff>0){

const days=Math.floor(diff/86400000);

cd.innerHTML="⏳ До праздника осталось "+days+" дней";

}else{

cd.innerHTML="🎉 Сегодня День рождения!";

}

},1000);

// Конфетти

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();

window.onresize=resize;

const confetti=[];

for(let i=0;i<150;i++){

confetti.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:2+Math.random()*4,

v:1+Math.random()*3

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(p=>{

p.y+=p.v;

if(p.y>canvas.height)p.y=0;

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
