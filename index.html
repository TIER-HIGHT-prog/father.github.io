<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>С Днём рождения, Папа!</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1026,#3b0764);
overflow-x:hidden;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.card{
position:relative;
z-index:2;
max-width:900px;
width:100%;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(255,255,255,.15);
text-align:center;
}

h1{
font-size:42px;
margin-bottom:20px;
animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{

0%{
transform:scale(1);
text-shadow:0 0 10px #fff;
}

100%{
transform:scale(1.08);
text-shadow:0 0 30px gold,
0 0 60px orange;
}

}

img{
width:100%;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.45);
transition:opacity 1s;
}

p{
margin-top:20px;
font-size:20px;
line-height:1.7;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="card">

<h1>🎉 С 40-летием, Папа! 🎂</h1>

<img id="photo" src="images/p1.jpg">

<p>
Спасибо за твою любовь, заботу и поддержку.
Желаю крепкого здоровья, счастья,
радости, исполнения всех мечтаний
и долгих счастливых лет! ❤️
</p>

</div>

<script>

const photos=[
"images/p1.jpg",
"images/p2.jpg",
"images/p3.jpg",
"images/p4.jpg",
"images/p5.jpg",
"images/p6.jpg",
"images/p7.jpg"
];

let index=0;

setInterval(()=>{

const img=document.getElementById("photo");

img.style.opacity=0;

setTimeout(()=>{

index=(index+1)%photos.length;

img.src=photos[index];

img.style.opacity=1;

},500);

},3500);

// Конфетти

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.onresize=resize;

const particles=[];

for(let i=0;i<180;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:2+Math.random()*4,
v:1+Math.random()*3

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.y+=p.v;

if(p.y>canvas.height){

p.y=0;
p.x=Math.random()*canvas.width;

}

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
